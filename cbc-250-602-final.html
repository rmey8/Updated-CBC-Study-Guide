<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>250-602 CBC — Technical Specialist Study Guide</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #A32D2D; --red-light: #FCEBEB; --red-dark: #501313; --red-mid: #E24B4A;
    --bg: #f8f7f5; --surface: #fff; --border: rgba(0,0,0,0.09);
    --text: #1a1a1a; --text-muted: #666; --text-hint: #999;
    --success: #3B6D11; --success-bg: #EAF3DE;
    --danger: #A32D2D; --danger-bg: #FCEBEB;
    --amber: #854F0B; --amber-bg: #FAEEDA;
    --info: #185FA5; --info-bg: #E6F1FB;
    --nav-bg: #1C3557;
    --radius: 8px; --radius-lg: 12px;
    --font: system-ui, -apple-system, sans-serif;
    --mono: 'Courier New', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }
  .header { background: var(--red-dark); color: white; padding: 14px 24px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 200; border-bottom: 3px solid var(--red-mid); }
  .header-badge { background: var(--red-mid); font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
  .header h1 { font-size: 15px; font-weight: 500; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 1px; }
  .top-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 57px; z-index: 199; }
  .top-tab { padding: 11px 18px; border: none; background: none; font-family: var(--font); font-size: 14px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; white-space: nowrap; }
  .top-tab:hover { color: var(--text); }
  .top-tab.active { color: var(--red); border-bottom-color: var(--red); font-weight: 500; }
  .main { max-width: 960px; margin: 0 auto; padding: 24px; }
  .section { display: none; }
  .section.active { display: block; }
  .domain-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .domain-chip { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-size: 12px; cursor: pointer; transition: all 0.15s; color: var(--text-muted); white-space: nowrap; }
  .domain-chip:hover { border-color: var(--red); color: var(--red); }
  .domain-chip.active { background: var(--red); border-color: var(--red); color: white; }
  .domain-card { display: none; }
  .domain-card.active { display: block; }
  .guide-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 16px; }
  .guide-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .guide-icon { width: 38px; height: 38px; border-radius: var(--radius); background: var(--red-light); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .guide-card-header h2 { font-size: 16px; font-weight: 500; }
  .guide-card-header p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .nav-path { display: flex; align-items: center; gap: 6px; font-size: 12px; font-family: var(--mono); background: var(--nav-bg); color: #a8c4e0; padding: 8px 14px; border-radius: var(--radius); margin: 12px 0; flex-wrap: wrap; }
  .nav-path .sep { color: #4a7fa8; }
  .nav-path .current { color: #7dd3fc; font-weight: 500; }
  .sop { margin: 14px 0; }
  .sop-title { font-size: 13px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .step { display: flex; gap: 12px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .step:last-child { border-bottom: none; }
  .step-num { width: 24px; height: 24px; border-radius: 50%; background: var(--red); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
  .step-text { font-size: 14px; line-height: 1.6; flex: 1; }
  .step-text strong { font-weight: 500; }
  .step-text code { font-family: var(--mono); font-size: 12px; background: var(--bg); padding: 1px 5px; border-radius: 4px; border: 1px solid var(--border); color: var(--red); }
  .tip { background: var(--amber-bg); border: 1px solid rgba(133,79,11,0.15); border-radius: var(--radius); padding: 10px 14px; margin: 12px 0; font-size: 13px; color: var(--amber); }
  .tip::before { content: "Exam tip  "; font-weight: 600; }
  .info { background: var(--info-bg); border: 1px solid rgba(24,95,165,0.15); border-radius: var(--radius); padding: 10px 14px; margin: 12px 0; font-size: 13px; color: var(--info); }
  .warn { background: var(--red-light); border: 1px solid rgba(163,45,45,0.15); border-radius: var(--radius); padding: 10px 14px; margin: 12px 0; font-size: 13px; color: var(--red); }
  .success-box { background: var(--success-bg); border: 1px solid rgba(59,109,17,0.15); border-radius: var(--radius); padding: 10px 14px; margin: 12px 0; font-size: 13px; color: var(--success); }
  h3.sub { font-size: 14px; font-weight: 500; margin: 18px 0 10px; border-left: 3px solid var(--red); padding-left: 10px; }
  .table-wrap { overflow-x: auto; margin: 12px 0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--bg); padding: 8px 12px; text-align: left; font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }
  .mini-card { background: var(--bg); border-radius: var(--radius); padding: 12px 14px; border: 1px solid var(--border); }
  .mini-card .mc-title { font-size: 12px; font-weight: 600; color: var(--red); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .mini-card ul { font-size: 13px; padding-left: 16px; }
  .mini-card li { margin-bottom: 4px; }
  @media(max-width:600px) { .two-col { grid-template-columns: 1fr; } }
  /* QUIZ */
  .quiz-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .progress-bar { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--red); border-radius: 3px; transition: width 0.3s; }
  .progress-text { font-size: 13px; color: var(--text-muted); font-family: var(--mono); white-space: nowrap; }
  .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 26px; margin-bottom: 14px; }
  .q-number { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-family: var(--mono); }
  .q-tag { display: inline-block; font-size: 11px; background: var(--red-light); color: var(--red); padding: 2px 8px; border-radius: 4px; margin-bottom: 10px; }
  .q-text { font-size: 15px; font-weight: 500; margin-bottom: 16px; line-height: 1.55; }
  .multi-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; font-style: italic; }
  .options { display: flex; flex-direction: column; gap: 9px; }
  .option-btn { width: 100%; text-align: left; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--surface); font-family: var(--font); font-size: 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s; display: flex; gap: 11px; align-items: flex-start; color: var(--text); }
  .option-btn:hover:not(:disabled) { border-color: var(--red); background: var(--red-light); }
  .option-btn.selected { border-color: var(--red); background: var(--red-light); }
  .option-btn.correct { border-color: var(--success); background: var(--success-bg); color: var(--success); }
  .option-btn.incorrect { border-color: var(--danger); background: var(--danger-bg); color: var(--danger); }
  .option-letter { width: 22px; height: 22px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 1px; font-family: var(--mono); }
  .submit-btn { background: var(--red); color: white; border: none; padding: 9px 22px; border-radius: var(--radius); font-family: var(--font); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 14px; }
  .submit-btn:disabled { background: var(--text-hint); cursor: not-allowed; }
  .explanation { margin-top: 14px; padding: 13px; background: var(--info-bg); border: 1px solid rgba(24,95,165,0.18); border-radius: var(--radius); font-size: 13px; color: var(--info); display: none; line-height: 1.6; }
  .explanation.show { display: block; }
  .quiz-nav { display: flex; gap: 10px; margin-top: 14px; }
  .nav-btn { padding: 7px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-family: var(--font); font-size: 13px; cursor: pointer; color: var(--text); transition: all 0.15s; }
  .nav-btn:hover { border-color: var(--red); color: var(--red); }
  .nav-btn:disabled { color: var(--text-hint); cursor: not-allowed; }
  .nav-btn.primary { background: var(--red); color: white; border-color: var(--red); }
  .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; text-align: center; display: none; }
  .score-card.show { display: block; }
  .score-big { font-size: 60px; font-weight: 300; color: var(--red); font-family: var(--mono); }
  .score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
  .fact-card { background: var(--bg); border-radius: var(--radius); padding: 12px 14px; border-left: 3px solid var(--red); }
  .fact-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .fact-card .value { font-size: 13px; font-weight: 500; }
  .domain-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .domain-row:last-child { border-bottom: none; }
  .domain-bar-wrap { width: 100px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .domain-bar { height: 100%; border-radius: 3px; }
  /* TUTOR */
  .tutor-area { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; height: 500px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 88%; padding: 11px 15px; border-radius: var(--radius-lg); font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--red); color: white; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.thinking { align-self: flex-start; background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); font-style: italic; font-size: 13px; border-bottom-left-radius: 4px; }
  .chat-input-row { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--border); }
  .chat-input { flex: 1; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; font-family: var(--font); font-size: 14px; outline: none; background: var(--bg); }
  .chat-input:focus { border-color: var(--red); }
  .chat-send { background: var(--red); color: white; border: none; border-radius: var(--radius); padding: 8px 16px; font-family: var(--font); font-size: 14px; cursor: pointer; }
  .chat-send:disabled { background: var(--text-hint); cursor: not-allowed; }
  .quick-questions { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
  .quick-q { padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); font-size: 12px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
  .quick-q:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>
<div class="header">
  <div class="header-badge">250-602</div>
  <div>
    <h1>Carbon Black Cloud — Technical Specialist</h1>
    <div class="header-sub">6 exam domains · Verified against TechDocs &amp; official study guide</div>
  </div>
</div>
<nav class="top-nav">
  <button class="top-tab active" onclick="switchTab('guide',this)">Study Guide</button>
  <button class="top-tab" onclick="switchTab('quiz',this)">Practice Quiz</button>
  <button class="top-tab" onclick="switchTab('tutor',this)">AI Tutor</button>
</nav>
<div class="main">
  <div class="section active" id="section-guide">
    <div class="domain-nav" id="domainNav"></div>
    <div id="domainCards"></div>
  </div>
  <div class="section" id="section-quiz">
    <div class="quiz-progress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">0 / 40</div>
    </div>
    <div id="quizArea"></div>
    <div class="score-card" id="scoreCard">
      <div class="score-big" id="scoreBig"></div>
      <div class="score-label" style="font-size:14px;color:var(--text-muted);margin-top:6px;">correct</div>
      <div style="font-size:18px;font-weight:500;margin-top:14px;" id="scorePass"></div>
      <div class="score-grid" id="scoreGrid"></div>
      <div id="domainBreakdown" style="text-align:left;margin-top:16px;"></div>
      <button class="nav-btn primary" onclick="resetQuiz()" style="margin-top:16px;">Retake</button>
    </div>
  </div>
  <div class="section" id="section-tutor">
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:14px;">Ask anything about the 250-602 exam domains.</p>
    <div class="quick-questions" id="quickQuestions"></div>
    <div class="tutor-area">
      <div class="chat-messages" id="chatMessages">
        <div class="msg assistant">Ready Ron. Ask me to explain any concept, walk through a workflow, or quiz you on any of the 6 exam domains.</div>
      </div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" placeholder="e.g. What are the 6 built-in CBC roles and what can each one do?" onkeydown="if(event.key==='Enter')sendChat()" />
        <button class="chat-send" id="chatSend" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
</div>
<script>
const DOMAINS = [
  {
    id:'admin', icon:'🖥', title:'CBC Administration', subtitle:'Platform capabilities, roles, users, alerts, response',
    html:`
      <div class="guide-card">
        <div class="guide-card-header"><div class="guide-icon">🖥</div><div><h2>Platform Overview</h2><p>What CBC is and what it collects — Source: Official study guide sample questions</p></div></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Feature</th><th>Detail</th></tr></thead>
          <tbody>
            <tr><td><strong>Platform type</strong></td><td>Cloud-native SaaS — no on-premises server required</td></tr>
            <tr><td><strong>Key capabilities</strong></td><td>Real-time endpoint protection AND threat hunting and incident response</td></tr>
            <tr><td><strong>Data collected</strong></td><td>Process executions, file activity, network connections, registry changes</td></tr>
            <tr><td><strong>NOT collected</strong></td><td>Clipboard history, keyboard inputs, mouse movements</td></tr>
            <tr><td><strong>Supported OS</strong></td><td>Windows, macOS, Linux — NOT Chrome OS, Android, iOS</td></tr>
            <tr><td><strong>Sensor role</strong></td><td>Monitors and reports on endpoint activities — does NOT encrypt data, affect bandwidth, or physically secure devices</td></tr>
            <tr><td><strong>Verify sensor comms</strong></td><td>CBC console under the sensor's health status</td></tr>
            <tr><td><strong>Policy change effect</strong></td><td>Updates sensors' configuration on next check-in — no restart required</td></tr>
          </tbody>
        </table></div>
        <div class="tip">The official sample questions test these exact facts. Know: real-time protection + threat hunting are the two key features. Process executions is what CBC collects. Windows and macOS are the two supported OS answers when asked to choose two.</div>
      </div>
      <div class="guide-card">
        <div class="guide-card-header"><div class="guide-icon">👥</div><div><h2>Built-in Roles — All 6</h2><p>Source: CBC User Guide / TechDocs</p></div></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Role</th><th>What They Can Do</th><th>Key Restrictions</th></tr></thead>
          <tbody>
            <tr><td><strong>View All</strong></td><td>View pages, export data, add notes and tags</td><td>Cannot take any action — read-only equivalent</td></tr>
            <tr><td><strong>Level 1 Analyst</strong></td><td>Triage alerts, place assets in/out of quarantine</td><td>No Live Response</td></tr>
            <tr><td><strong>Level 2 Analyst</strong></td><td>All Level 1 + Live Response (file/registry changes, quarantine)</td><td>No policy management, no user management</td></tr>
            <tr><td><strong>Level 3 Analyst</strong></td><td>All Level 2 + process execution, memory dump, removal from endpoints</td><td>No policy management, no user management</td></tr>
            <tr><td><strong>System Admin</strong></td><td>Daily admin — adding users, managing sensors, enabling bypass</td><td>Cannot use Live Response, cannot change global settings, cannot delete files</td></tr>
            <tr><td><strong>Super Admin</strong></td><td>All permissions — console setup, Live Response, policy management, API keys, group rules</td><td>None</td></tr>
          </tbody>
        </table></div>
        <div class="warn"><strong>System Admin cannot use Live Response.</strong> This is the most important distinction to know. If a question asks who can manage users but also needs Live Response, the answer is Super Admin — not System Admin.</div>
        <div class="tip">Level 1 = triage + quarantine only. Level 2 = adds Live Response. The step up from L1 to L2 is specifically Live Response access.</div>
      </div>
      <div class="guide-card">
        <div class="guide-card-header"><div class="guide-icon">🔔</div><div><h2>Alert Types</h2><p>Source: CBC User Guide — Alert Types page</p></div></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Alert Type</th><th>What Generates It</th><th>Key Note</th></tr></thead>
          <tbody>
            <tr><td><strong>CB Analytics</strong></td><td>CBC analytics engine — behavioral detection</td><td>Can be triaged. Severity 1–10.</td></tr>
            <tr><td><strong>Watchlist</strong></td><td>Match against a subscribed or custom watchlist query</td><td>Requires Enterprise EDR. Can be triaged.</td></tr>
            <tr><td><strong>USB Device Control</strong></td><td>User attempts to access a blocked USB device</td><td><strong>Cannot be triaged or investigated</strong></td></tr>
            <tr><td><strong>Host-Based Firewall</strong></td><td>Defined firewall rule violated</td><td>Max 100 observations per alert</td></tr>
            <tr><td><strong>Containers Runtime</strong></td><td>Suspicious behavior per containers runtime policy</td><td>Anomaly or known attack pattern</td></tr>
            <tr><td><strong>IDS</strong></td><td>Network activity matching known threat signatures</td><td>Max 100 observations per alert</td></tr>
          </tbody>
        </table></div>
        <div class="tip">USB Device Control alerts cannot be triaged or investigated — this is called out specifically in TechDocs. It's a likely exam distractor.</div>
      </div>
      <div class="guide-card">
        <div class="guide-card-header"><div class="guide-icon">⚡</div><div><h2>Response Actions</h2><p>Source: CBC User Guide — Module 7: Response Capabilities</p></div></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Action</th><th>What It Does</th><th>Key Detail</th></tr></thead>
          <tbody>
            <tr><td><strong>Quarantine</strong></td><td>Isolates endpoint from all network traffic except CBC cloud channel</td><td>Live Response still works on quarantined endpoints. Works in bypass mode too.</td></tr>
            <tr><td><strong>Live Response</strong></td><td>Interactive command shell to the endpoint</td><td>Requires sensor online. Requires role with Live Response permission. Max 100 concurrent sessions, 250 commands per session, 15-min idle timeout.</td></tr>
            <tr><td><strong>Hash Ban</strong></td><td>Blocks a specific file hash from executing</td><td>Does NOT delete the file from endpoints. Prevention only — does not remove existing copies.</td></tr>
          </tbody>
        </table></div>
        <div class="tip">Official sample Q10: valid response action = Quarantine. Live Query is NOT a response action — it is an investigation/compliance tool.</div>
      </div>`
  },
  {
    id:'policies', icon:'📋', title:'CBC Policies', subtitle:'Policy components, rules, prevention, local scan',
    html:`
      <div class="guide-card">
        <div class="guide-card-header"><div class="guide-icon">📋</div><div><h2>Policy Fundamentals</h2><p>Source: CBC User Guide — Managing Policies</p></div></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Fact</th><th>Detail</th></tr></thead>
          <tbody>
            <tr><td><strong>Default policy</strong></td><td>Standard — all new sensors go here unless a policy is specified at command line install</td></tr>
            <tr><td><strong>Standard policy</strong></td><td>Cannot be modified — must duplicate it first, then modify the copy</td></tr>
            <tr><td><strong>Policy change effect</strong></td><td>Updates on sensor's next check-in — no restart needed</td></tr>
            <tr><td><strong>Policy assignment</strong></td><td>Can be set at command line install, through Asset Group membership, or manually from Inventory page</td></tr>
            <tr><td><strong>Multiple group membership</strong></td><td>If asset belongs to multiple groups with different policies, highest-ranked policy wins — unless manually assigned (manual always wins)</td></tr>
          </tbody>
        </table></div>
        <div class="warn"><strong>Standard policy cannot be modified.</strong> Broadcom explicitly states: "You cannot modify the Standard policy — duplicate it first." This is a likely exam question.</div>
      </div>
      <div class="guide-card">
        <div class="guide-card-header"><div class="guide-icon">⚙️</div><div><h2>Policy Components — 4 Tabs</h2><p>Source: Endpoint Standard course Module 4 — Policy Components</p></div></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Tab</th><th>What It Controls</th><th>Key Note</th></tr></thead>
          <tbody>
            <tr><td><strong>Prevention</strong></td><td>Reputation-based actions per file category — what happens when Known Malware, Suspect Malware, PUP, Adaptive Allowlist, or Not Listed files execute</td><td>Actions: Block, Block &amp; Report, Allow, Allow &amp; Log, Terminate</td></tr>
            <tr><td><strong>Local Scan</strong></td><td>On-access signature scanning for known malware</td><td><strong>Windows sensors only</strong> — not available on macOS or Linux. Modes: Disabled, Normal (first execute), Aggressive (all executes)</td></tr>
            <tr><td><strong>Sensor</strong></td><td>Which event types the sensor collects and streams to CBC cloud</td><td>More capabilities = more telemetry = more resource use</td></tr>
            <tr><td><strong>Rules</strong></td><td>Custom blocking and permission rules beyond reputation handling</td><td>Use Test Rule feature to evaluate impact before deploying</td></tr>
          </tbody>

   explanation:'B. Hash banning blocks the specific SHA-256 hash from executing going forward. It does NOT delete the file from endpoints that already have it, does NOT quarantine endpoints, and does NOT automatically submit the file anywhere. If you need to remove the file from existing endpoints, that requires Live Response. Source: CBC User Guide.'},
  {id:15,domain:'CBC Administration',

   type:'single',

  {id:16,domain:'CBC Policies',
   text:'An administrator wants to modify the Standard policy to add more restrictive prevention rules. What must they do first?',

  {id:17,domain:'CBC Policies',
   text:'What is the purpose of the Local Scan tab within a CBC policy?',

  {id:18,domain:'CBC Policies',

  {id:19,domain:'CBC Policies',
   text:'A security team wants to evaluate the impact of a new blocking rule before it actively prevents anything. What is the correct approach in CBC?',

  {id:20,domain:'CBC Policies',

  {id:24,domain:'CBC Sensors',

  {id:25,domain:'Live Query',

  {id:26,domain:'Live Query',
   text:'An analyst runs an ad hoc Live Query and does not receive results from 3 of 500 endpoints. What is the most likely reason?',

  {id:29,domain:'Enterprise EDR',

  {id:32,domain:'CBC Workload',

  {id:33,domain:'CBC Workload',

  {id:37,domain:'Live Response',

function switchTab(tab, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.top-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('section-' + tab).classList.add('active');
  el.classList.add('active');
}

function buildStudyGuide() {
  const nav = document.getElementById('domainNav');
  const cards = document.getElementById('domainCards');
  DOMAINS.forEach((d, i) => {
    const chip = document.createElement('button');
    chip.className = 'domain-chip' + (i === 0 ? ' active' : '');
    chip.textContent = d.title;
    chip.onclick = () => selectDomain(d.id);
    nav.appendChild(chip);
    const card = document.createElement('div');
    card.className = 'domain-card' + (i === 0 ? ' active' : '');
    card.id = 'domain-' + d.id;
    card.innerHTML = d.html;
    cards.appendChild(card);
  });
}

function selectDomain(id) {
  document.querySelectorAll('.domain-chip').forEach((c,i) => c.classList.toggle('active', DOMAINS[i].id === id));
  document.querySelectorAll('.domain-card').forEach(c => c.classList.toggle('active', c.id === 'domain-' + id));
}

let currentQ = 0, answers = {}, submitted = {}, score = 0;
function buildQuiz() { renderQuestion(0); }

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  const area = document.getElementById('quizArea');
  const done = Object.keys(submitted).length;
  document.getElementById('progressFill').style.width = (done / QUESTIONS.length * 100) + '%';
  document.getElementById('progressText').textContent = done + ' / ' + QUESTIONS.length;
  const isSubmitted = !!submitted[q.id];
  const ua = answers[q.id] || [];
  const opts = q.options.map((o, oi) => {
    let cls = 'option-btn';
    if (isSubmitted) { if (q.correct.includes(oi)) cls += ' correct'; else if (ua.includes(oi)) cls += ' incorrect'; }
    else if (ua.includes(oi)) cls += ' selected';
    return `<button class="${cls}" onclick="selectOption(${q.id},${oi},'${q.type}')" ${isSubmitted?'disabled':''}><span class="option-letter">${String.fromCharCode(65+oi)}</span><span>${o}</span></button>`;
  }).join('');
  area.innerHTML = `<div class="quiz-card">
    <div class="q-number">Question ${idx+1} of ${QUESTIONS.length}</div>
    <div class="q-tag">${q.domain}</div>
    ${q.type==='multi'?'<div class="multi-hint">Select all that apply</div>':''}
    <div class="q-text">${q.text}</div>
    <div class="options">${opts}</div>
    ${!isSubmitted?`<button class="submit-btn" id="submitBtn" onclick="submitAnswer(${q.id})" ${ua.length===0?'disabled':''}>Check answer</button>`:''}
    <div class="explanation ${isSubmitted?'show':''}">${q.explanation}</div>
  </div>
  <div class="quiz-nav">
    <button class="nav-btn" onclick="goQ(${idx-1})" ${idx===0?'disabled':''}>← Previous</button>
    ${idx < QUESTIONS.length-1 ? `<button class="nav-btn primary" onclick="goQ(${idx+1})">Next →</button>` : `<button class="nav-btn primary" onclick="showScore()">See results</button>`}
  </div>`;
}

function selectOption(qid, oi, type) {
  if (!answers[qid]) answers[qid] = [];
  if (type==='single') answers[qid]=[oi];
  else { const i=answers[qid].indexOf(oi); if(i>-1) answers[qid].splice(i,1); else answers[qid].push(oi); }
  const btn=document.getElementById('submitBtn');
  if(btn) btn.disabled=answers[qid].length===0;
  renderQuestion(currentQ);
}

function submitAnswer(qid) {
  const q=QUESTIONS.find(q=>q.id===qid);
  const ua=answers[qid]||[];
  const ok=JSON.stringify(ua.slice().sort())===JSON.stringify(q.correct.slice().sort());
  submitted[qid]={correct:ok};
  if(ok) score++;
  renderQuestion(currentQ);
}

function goQ(idx) { currentQ=idx; renderQuestion(idx); }

function showScore() {
  document.getElementById('quizArea').style.display='none';
  const sc=document.getElementById('scoreCard'); sc.classList.add('show');
  const pct=Math.round(score/QUESTIONS.length*100);
  document.getElementById('scoreBig').textContent=score+'/'+QUESTIONS.length;
  const pass=document.getElementById('scorePass');
  pass.textContent=pct>=80?'✓ Strong — you know this material':'Review the domains below and retake';
  pass.style.color=pct>=80?'var(--success)':'var(--danger)';
  document.getElementById('scoreGrid').innerHTML=`
    <div class="fact-card"><div class="label">Score</div><div class="value">${pct}%</div></div>
    <div class="fact-card"><div class="label">Correct</div><div class="value">${score}</div></div>
    <div class="fact-card"><div class="label">Missed</div><div class="value">${QUESTIONS.length-score}</div></div>`;
  const ds={};
  QUESTIONS.forEach(q=>{ if(!ds[q.domain]) ds[q.domain]={c:0,t:0}; ds[q.domain].t++; if(submitted[q.id]?.correct) ds[q.domain].c++; });
  let html='<h3 style="font-size:14px;font-weight:500;margin-bottom:12px;">By domain</h3>';
  Object.entries(ds).sort((a,b)=>(a[1].c/a[1].t)-(b[1].c/b[1].t)).forEach(([d,s])=>{
    const p=Math.round(s.c/s.t*100);
    const col=p===100?'var(--success)':p>=50?'var(--amber)':'var(--danger)';
    html+=`<div class="domain-row"><span style="flex:1;font-size:13px;">${d}</span><div class="domain-bar-wrap"><div class="domain-bar" style="width:${p}%;background:${col};"></div></div><span style="font-size:13px;font-family:var(--mono);font-weight:500;color:${col};min-width:32px;text-align:right;">${s.c}/${s.t}</span></div>`;
  });
  document.getElementById('domainBreakdown').innerHTML=html;
}

function resetQuiz() {
  currentQ=0; answers={}; submitted={}; score=0;
  document.getElementById('quizArea').style.display='';
  document.getElementById('scoreCard').classList.remove('show');
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('progressText').textContent='0 / '+QUESTIONS.length;
  renderQuestion(0);
}

let chatHistory=[];
async function sendChat() {
  const input=document.getElementById('chatInput');
  const sendBtn=document.getElementById('chatSend');
  const msgs=document.getElementById('chatMessages');
  const text=input.value.trim(); if(!text) return;
  input.value=''; sendBtn.disabled=true;
  const um=document.createElement('div'); um.className='msg user'; um.textContent=text;
  msgs.appendChild(um); msgs.scrollTop=msgs.scrollHeight;
  chatHistory.push({role:'user',content:text});
  const th=document.createElement('div'); th.className='msg thinking'; th.textContent='Thinking...';
  msgs.appendChild(th); msgs.scrollTop=msgs.scrollHeight;
  try {
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:`You are a focused exam prep tutor helping Ron Villagomez pass the Broadcom 250-602 Carbon Black Cloud Technical Specialist exam. Base answers ONLY on the official study guide and TechDocs. Key verified facts:

PLATFORM: Cloud-native SaaS. Features: real-time endpoint protection + threat hunting/IR. Collects: process executions, file activity, network connections, registry. NOT: clipboard, keyboard, mouse. Supported OS: Windows, macOS, Linux. Verify sensor comms: CBC console sensor health status. Policy changes update on next check-in, no restart needed.

ROLES (6 built-in): View All (view/export only, no actions). Level 1 Analyst (triage alerts, quarantine — NO Live Response). Level 2 Analyst (Level 1 + Live Response file/registry changes). Level 3 Analyst (Level 2 + process execution, memdump). System Admin (manage users/sensors/bypass — NO Live Response, NO global settings). Super Admin (all permissions).

POLICIES: Default = Standard. Standard cannot be modified — must duplicate first. Policy tabs: Prevention (reputation actions: Block, Block & Report, Allow, Allow & Log, Terminate — NO standalone "Report" action), Local Scan (Windows only — not macOS/Linux; modes: Disabled/Normal/Aggressive), Sensor (telemetry collection), Rules (custom rules). Core Prevention rules from TAU — delivered automatically. Test Rule feature to evaluate impact before deploying. Policy assigned at command line install, via Asset Groups, or manually.

SENSORS: Installer at Inventory → Endpoints → Sensor Options. Windows/macOS GUI install, Linux command line only. Admin rights required. Policy at install via command line arg.

ALERT TYPES: CB Analytics (behavioral, severity 1-10, can triage). Watchlist (EEDR required, can triage). USB Device Control (CANNOT be triaged or investigated). Host-Based Firewall. Containers Runtime. IDS.

RESPONSE: Quarantine (isolates network, keeps CBC channel open, Live Response still works). Hash Ban (blocks execution, does NOT delete files). Live Response (Level 2+ role required, works on quarantined AND bypass mode, max 100 sessions, 250 commands, 15-min idle timeout, commands logged in CBC audit log AND on endpoint). Commands: get (pull file from endpoint), put (upload to endpoint), ps, kill [PID], dir, delete, execfg "full\path" (requires fully qualified path), exec, memdump.
